<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The KALKI Protection</title>
    <style>
        /* CSS Variables for theming */
        :root {
            --bg-dark: #050505;
            --bg-glow: radial-gradient(circle at 50% 50%, #0a1128 0%, #000000 100%);
            --red-alert: #ff2a2a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            --glass-glow: 0 0 60px rgba(40, 100, 255, 0.15);
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            background: var(--bg-glow);
            color: #fff;
            font-family: var(--font-stack);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- HACK PHASE STYLES --- */
        #hack-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.8s ease-out;
        }

        .code-rain {
            position: absolute;
            font-family: monospace;
            font-size: 14px;
            color: var(--red-alert);
            white-space: pre;
            opacity: 0.8;
            filter: drop-shadow(0 0 5px var(--red-alert));
            animation: moveDown linear infinite, glitch-text 0.2s infinite alternate;
        }

        .warning-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(24px, 5vw, 64px);
            font-weight: 900;
            color: var(--red-alert);
            text-align: center;
            letter-spacing: 5px;
            text-shadow: 0 0 20px var(--red-alert), 0 0 40px var(--red-alert);
            animation: pulse-alert 0.5s infinite;
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(255, 42, 42, 0.5);
            box-shadow: 0 0 20px rgba(255, 42, 42, 0.8);
            animation: scan 2s linear infinite;
        }

        .vignette-red {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.2);
            animation: flash-red 2s infinite;
        }

        /* --- SECURE PHASE (PREMIUM GLASS UI) --- */
        #secure-container {
            position: absolute;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
            transition: opacity 1.5s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #secure-container.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: all;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: var(--glass-shadow), var(--glass-glow);
            max-width: 90%;
            width: 480px;
            position: relative;
            overflow: hidden;
        }

        /* Subtle moving reflection for liquid glass effect */
        .glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.05) 40%,
                rgba(255, 255, 255, 0) 50%
            );
            transform: rotate(30deg);
            animation: glass-shine 6s infinite linear;
            pointer-events: none;
        }

        h1 {
            font-size: clamp(28px, 4vw, 36px);
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 0%, #a0c0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(160, 192, 255, 0.2);
        }

        p {
            font-size: clamp(14px, 2vw, 16px);
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 30px;
        }

        #replay-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            backdrop-filter: blur(10px);
        }

        #replay-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* --- ANIMATIONS --- */
        @keyframes scan {
            0% { top: -10px; }
            100% { top: 100%; }
        }

        @keyframes moveDown {
            0% { transform: translateY(-100%); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        @keyframes pulse-alert {
            0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.02); }
        }

        @keyframes flash-red {
            0%, 100% { box-shadow: inset 0 0 50px rgba(255, 0, 0, 0.1); }
            50% { box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.3); }
        }

        @keyframes glitch-text {
            0% { transform: skewX(0deg); }
            20% { transform: skewX(-5deg); filter: drop-shadow(2px 0 0 rgba(0,255,255,0.5)); }
            40% { transform: skewX(5deg); filter: drop-shadow(-2px 0 0 rgba(255,0,255,0.5)); }
            60% { transform: skewX(0deg); }
            100% { transform: skewX(0deg); }
        }

        @keyframes glass-shine {
            0% { top: -150%; left: -150%; }
            100% { top: 150%; left: 150%; }
        }

        /* Utility class for rapid deletion of code elements */
        .deleting {
            opacity: 0 !important;
            transform: scale(0.8) !important;
            filter: blur(4px) !important;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1) !important;
        }
    </style>
</head>
<body>

    <div id="hack-container">
        <div class="vignette-red"></div>
        <div class="scanline"></div>
        <div class="warning-overlay" id="warning-text">SYSTEM BREACH DETECTED</div>
        <div id="code-plane"></div>
    </div>

    <div id="secure-container">
        <div class="glass-card">
            <h1>The KALKI Protection</h1>
            <p>Your system is secured.</p>
            <button id="replay-btn">Replay Sequence</button>
        </div>
    </div>

    <script>
        // Decorative code snippets representing various languages
        const codeSnippets = [
            "function bypassFirewall() {\n  document.cookie = 'admin=true';\n}",
            "import socket\ns = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\ns.connect(('10.0.0.1', 8080))",
            "sudo rm -rf /var/logs/security",
            "SELECT * FROM users WHERE access_level = 'ROOT';",
            "01101000 01100001 01100011 01101011",
            "while(true) {\n  bruteForce(target_ip);\n}",
            "<script>alert('System Compromised');<\/script>",
            "OVERRIDE_MAINFRAME = True\nif OVERRIDE_MAINFRAME:\n  disable_alarms()",
            "fetch('http://dark-server.net/payload')\n.then(res => res.json())",
            "var mem = process.memoryUsage();\ninjectPayload(mem.heapUsed);"
        ];

        let hackInterval;
        let hackTimeout;
        let cleanupTimeout;

        const hackContainer = document.getElementById('hack-container');
        const codePlane = document.getElementById('code-plane');
        const secureContainer = document.getElementById('secure-container');
        const warningText = document.getElementById('warning-text');
        const replayBtn = document.getElementById('replay-btn');

        // Function to spawn a random code block falling down
        function spawnCode() {
            const el = document.createElement('div');
            el.className = 'code-rain';
            
            // Random snippet
            el.innerText = codeSnippets[Math.floor(Math.random() * codeSnippets.length)];
            
            // Random styling for chaos
            el.style.left = Math.random() * 90 + 'vw';
            el.style.animationDuration = (Math.random() * 2 + 1) + 's';
            el.style.fontSize = Math.floor(Math.random() * 14 + 10) + 'px';
            
            codePlane.appendChild(el);

            // Remove element after it falls
            setTimeout(() => {
                if(el.parentElement) el.remove();
            }, 3000);
        }

        // Main Intro Sequence
        function startSequence() {
            // Reset states
            codePlane.innerHTML = '';
            hackContainer.style.opacity = '1';
            secureContainer.classList.remove('active');
            warningText.innerText = 'SYSTEM BREACH DETECTED';
            warningText.style.color = 'var(--red-alert)';

            // Phase 1: Start Chaos
            hackInterval = setInterval(spawnCode, 80);

            // Switch warning text midway
            setTimeout(() => {
                warningText.innerText = 'OVERRIDING SECURITY PROTOCOLS...';
            }, 1500);

            // Phase 2: System takes control (Cleanup)
            hackTimeout = setTimeout(() => {
                clearInterval(hackInterval);
                warningText.innerText = 'THREAT NEUTRALIZED';
                warningText.style.color = '#00ffcc'; // Temporary cyan before disappearing

                // Force all current code to "delete" itself quickly
                const allCodeElements = document.querySelectorAll('.code-rain');
                allCodeElements.forEach(code => {
                    code.classList.add('deleting');
                });

                // Phase 3: Transition to Premium Glass UI
                cleanupTimeout = setTimeout(() => {
                    hackContainer.style.opacity = '0';
                    
                    setTimeout(() => {
                        secureContainer.classList.add('active');
                    }, 500); // Wait for hack container to fade out
                }, 800); // Time it takes to show "THREAT NEUTRALIZED"

            }, 4000); // Chaos lasts 4 seconds
        }

        // Event Listeners
        replayBtn.addEventListener('click', () => {
            // Prevent clicking rapidly
            clearTimeout(hackTimeout);
            clearTimeout(cleanupTimeout);
            clearInterval(hackInterval);
            startSequence();
        });

        // Initialize animation on load
        window.onload = startSequence;

    </script>
</body>
</html>
