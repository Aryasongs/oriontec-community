<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Govt of India | Citizen Data Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #003366;
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid #ff9933;
        }
        .container {
            width: 90%;
            margin: 30px auto;
            background: white;
            padding: 20px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        h2 {
            color: #003366;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }
        th {
            background-color: #f8f9fa;
            color: #333;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .highlight {
            background-color: #fff3cd !important;
            font-weight: bold;
        }
        .badge {
            background: #28a745;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
    </style>
</head>
<body>

<header>
    <h1>GOVERNMENT OF INDIA</h1>
    <p>National Citizen Database & Records (Verification Portal)</p>
</header>

<div class="container">
    <h2>Search Results: "Anmol Sunda"</h2>
    <p>Total Records Found: 50</p>
    
    <table>
        <thead>
            <tr>
                <th>Sr. No</th>
                <th>Full Name</th>
                <th>Father's Name</th>
                <th>D.O.B</th>
                <th>Address</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="data-table">
            <tr class="highlight">
                <td>1</td>
                <td>Anmol Sunda</td>
                <td>Kewal Ram</td>
                <td>26/11/2006</td>
                <td>Banga Bharo Mazara, 144511, SBS Nagar, Punjab, India</td>
                <td><span class="badge">Verified</span></td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    const tableBody = document.getElementById('data-table');
    const firstNames = ["Anmol Sunda"];
    const fathers = ["Ram Lal", "Satish Kumar", "Vijay Singh", "Harbans Lal", "Baldev Raj", "Gurmail Singh", "Mohan Das"];
    const cities = ["Jalandhar", "Ludhiana", "Amritsar", "Phagwara", "Hoshiarpur", "Patiala"];

    // Loop to generate 49 more random names
    for (let i = 2; i <= 50; i++) {
        let randomFather = fathers[Math.floor(Math.random() * fathers.length)];
        let randomDay = Math.floor(Math.random() * 28) + 1;
        let randomMonth = Math.floor(Math.random() * 12) + 1;
        let randomYear = Math.floor(Math.random() * (2008 - 1990 + 1)) + 1990;
        let randomCity = cities[Math.floor(Math.random() * cities.length)];
        
        let row = `<tr>
            <td>${i}</td>
            <td>Anmol Sunda</td>
            <td>${randomFather}</td>
            <td>${randomDay}/${randomMonth}/${randomYear}</td>
            <td>House No ${Math.floor(Math.random()*500)}, ${randomCity}, Punjab, India</td>
            <td><span class="badge" style="background:#6c757d;">Active</span></td>
        </tr>`;
        tableBody.innerHTML += row;
    }
</script>

</body>
</html>
