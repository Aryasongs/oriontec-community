<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELD Compliance Pro - Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-line { stroke: #e5e7eb; stroke-width: 1; }
        .log-line { stroke: #2563eb; stroke-width: 3; fill: none; }
        .violation { color: #dc2626; font-weight: bold; }
        .status-card { transition: all 0.3s ease; }
        .active-status { border-left: 8px solid #2563eb; background: #eff6ff; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-bold tracking-tight">ELD <span class="text-blue-400">LOGBOOK</span></h1>
        <div class="text-right">
            <p class="text-sm opacity-75" id="current-date"></p>
            <p class="text-xs font-mono" id="current-time"></p>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-4 space-y-6">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm text-center border">
                <p class="text-xs text-gray-500 uppercase">Driving (11h)</p>
                <p id="drive-clock" class="text-2xl font-bold text-blue-600">11:00</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm text-center border">
                <p class="text-xs text-gray-500 uppercase">Workday (14h)</p>
                <p id="shift-clock" class="text-2xl font-bold text-blue-600">14:00</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm text-center border">
                <p class="text-xs text-gray-500 uppercase">Break In</p>
                <p id="break-clock" class="text-2xl font-bold text-orange-500">08:00</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm text-center border">
                <p class="text-xs text-gray-500 uppercase">Cycle (70h)</p>
                <p id="cycle-clock" class="text-2xl font-bold text-gray-700">70:00</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-md overflow-hidden border">
            <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                <h2 class="font-bold text-gray-700">Current Duty Status</h2>
                <span id="active-badge" class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold uppercase">Off Duty</span>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 divide-x divide-gray-100">
                <button onclick="setStatus('OFF_DUTY')" id="btn-OFF_DUTY" class="p-6 hover:bg-gray-50 flex flex-col items-center gap-2">
                    <span class="text-2xl">🏠</span>
                    <span class="text-sm font-semibold">Off Duty</span>
                </button>
                <button onclick="setStatus('SLEEPER')" id="btn-SLEEPER" class="p-6 hover:bg-gray-50 flex flex-col items-center gap-2">
                    <span class="text-2xl">🛌</span>
                    <span class="text-sm font-semibold">Sleeper</span>
                </button>
                <button onclick="setStatus('ON_DUTY')" id="btn-ON_DUTY" class="p-6 hover:bg-gray-50 flex flex-col items-center gap-2">
                    <span class="text-2xl">🔧</span>
                    <span class="text-sm font-semibold">On Duty</span>
                </button>
                <button onclick="setStatus('DRIVING')" id="btn-DRIVING" class="p-6 hover:bg-blue-50 flex flex-col items-center gap-2 border-l-4 border-transparent">
                    <span class="text-2xl">🚛</span>
                    <span class="text-sm font-semibold">Driving</span>
                </button>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-md border overflow-x-auto">
            <h3 class="text-sm font-bold text-gray-400 mb-4 uppercase">24-Hour Graph (Demo)</h3>
            <svg viewBox="0 0 800 160" class="w-full min-w-[600px]">
                <line x1="0" y1="40" x2="800" y2="40" class="grid-line" />
                <line x1="0" y1="80" x2="800" y2="80" class="grid-line" />
                <line x1="0" y1="120" x2="800" y2="120" class="grid-line" />
                
                <g font-size="10" fill="#9ca3af">
                    <text x="0" y="155">M</text><text x="100" y="155">3</text>
                    <text x="200" y="155">6</text><text x="300" y="155">9</text>
                    <text x="400" y="155">N</text><text x="500" y="155">3</text>
                    <text x="600" y="155">6</text><text x="700" y="155">9</text>
                    <text x="785" y="155">M</text>
                </g>

                <g font-size="10" font-weight="bold" fill="#6b7280">
                    <text x="-35" y="25" transform="translate(40,0)">OFF</text>
                    <text x="-35" y="65" transform="translate(40,0)">SB</text>
                    <text x="-35" y="105" transform="translate(40,0)">DR</text>
                    <text x="-35" y="145" transform="translate(40,0)">ON</text>
                </g>

                <path id="log-path" d="M 0 20 L 400 20 L 400 100 L 500 100" class="log-line" />
            </svg>
        </div>

        <div id="alert-container" class="hidden bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg">
            <div class="flex">
                <span class="text-red-500 font-bold mr-3">⚠️</span>
                <div>
                    <p class="text-red-800 font-bold">HOS Violation Detected</p>
                    <p id="alert-msg" class="text-red-700 text-sm">You have exceeded the 11-hour driving limit.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- REAL STRICT LOGIC ENGINE ---
        let currentStatus = 'OFF_DUTY';
        let driveSeconds = 0;
        let shiftSeconds = 0;
        let startTime = new Date();

        const LIMITS = {
            DRIVE: 11 * 3600,
            SHIFT: 14 * 3600,
            BREAK: 8 * 3600
        };

        function updateClocks() {
            if (currentStatus === 'DRIVING') {
                driveSeconds++;
            }
            if (currentStatus !== 'OFF_DUTY' && currentStatus !== 'SLEEPER') {
                shiftSeconds++;
            }

            // Calculations
            document.getElementById('drive-clock').innerText = formatTime(LIMITS.DRIVE - driveSeconds);
            document.getElementById('shift-clock').innerText = formatTime(LIMITS.SHIFT - shiftSeconds);

            // Violation Checking
            if (driveSeconds > LIMITS.DRIVE) triggerViolation("11-Hour Driving Limit Exceeded");
            if (shiftSeconds > LIMITS.SHIFT) triggerViolation("14-Hour Workday Limit Exceeded");
        }

        function setStatus(status) {
            // Remove active classes
            document.querySelectorAll('button').forEach(b => b.classList.remove('active-status'));
            
            currentStatus = status;
            document.getElementById(`btn-${status}`).classList.add('active-status');
            document.getElementById('active-badge').innerText = status.replace('_', ' ');
            
            // UI Color Flip for Driving
            const badge = document.getElementById('active-badge');
            if(status === 'DRIVING') {
                badge.className = "px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold uppercase";
            } else {
                badge.className = "px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold uppercase";
            }
        }

        function formatTime(totalSeconds) {
            const h = Math.floor(Math.abs(totalSeconds) / 3600);
            const m = Math.floor((Math.abs(totalSeconds) % 3600) / 60);
            return `${totalSeconds < 0 ? '-' : ''}${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }

        function triggerViolation(msg) {
            document.getElementById('alert-container').classList.remove('hidden');
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('drive-clock').classList.add('text-red-600');
        }

        // Initialize
        setInterval(updateClocks, 1000); // Real-time tick
        setStatus('OFF_DUTY');
        
        // Display Current Time
        setInterval(() => {
            const now = new Date();
            document.getElementById('current-date').innerText = now.toLocaleDateString();
            document.getElementById('current-time').innerText = now.toLocaleTimeString();
        }, 1000);

    </script>
</body>
</html>
