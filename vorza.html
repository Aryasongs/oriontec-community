<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HeartFit Pro | Accuracy Edition</title>
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <style>
        :root {
            --ios-red: #FF2D55; --ios-green: #34C759; --ios-blue: #007AFF;
            --ios-lightblue: #58CCFB; --bg: #000000; --card-bg: #1C1C1E;
        }

        body {
            font-family: 'SF Pro Display', sans-serif; background-color: var(--bg);
            color: white; margin: 0; padding: 20px; padding-bottom: 100px;
            -webkit-user-select: none;
        }

        /* --- HEADER & CALENDAR --- */
        header { margin-top: 10px; }
        .date-label { color: var(--ios-red); font-weight: bold; text-transform: uppercase; font-size: 14px; }
        .calendar-strip {
            display: flex; gap: 10px; margin: 20px 0; overflow-x: auto; padding-bottom: 10px;
        }
        .day-box {
            min-width: 60px; height: 80px; background: var(--card-bg); border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .day-box.today { border: 2px solid var(--ios-red); }
        .day-name { font-size: 12px; opacity: 0.6; }
        .day-num { font-size: 18px; font-weight: 800; }

        /* --- ACTIVITY RINGS --- */
        .rings-box {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); border-radius: 24px; padding: 25px; margin-bottom: 20px;
        }
        .ring-svg { transform: rotate(-90deg); width: 140px; height: 140px; }
        .ring-path { fill: none; stroke-width: 12; stroke-linecap: round; transition: 1s ease-out; }

        /* --- CARDS --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--card-bg); border-radius: 22px; padding: 20px; position: relative; }
        .card-full { grid-column: span 2; }
        .label { font-size: 13px; font-weight: 700; text-transform: uppercase; opacity: 0.8; margin-bottom: 8px; }
        .val { font-size: 32px; font-weight: 800; }
        .unit { font-size: 14px; color: #8E8E93; margin-left: 4px; }

        /* --- BREATHING & MAPS --- */
        .breath-circle {
            width: 70px; height: 70px; background: rgba(88, 204, 251, 0.2);
            border-radius: 50%; margin: 15px auto; border: 1px solid var(--ios-lightblue);
            animation: breathe 8s infinite ease-in-out;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.8); } }

        .btn {
            background: #2C2C2E; color: var(--ios-blue); border: none; padding: 12px;
            border-radius: 12px; font-weight: 600; width: 100%; margin-top: 10px; cursor: pointer;
        }
        .btn-active { background: var(--ios-green); color: black; }

        /* --- ONBOARDING MODAL --- */
        #onboarding {
            position: fixed; inset: 0; background: black; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; padding: 30px;
        }
        input {
            background: #1C1C1E; border: 1px solid #333; padding: 15px; border-radius: 12px;
            margin: 10px 0; color: white; font-size: 16px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="onboarding">
        <h1 style="font-size: 38px; font-weight: 900;">Set Profile</h1>
        <p style="opacity: 0.6;">We calculate accurate goals based on your body.</p>
        <input type="text" id="in-name" placeholder="Name">
        <input type="number" id="in-age" placeholder="Age">
        <input type="number" id="in-weight" placeholder="Weight (kg)">
        <input type="number" id="in-height" placeholder="Height (cm)">
        <button class="btn btn-active" onclick="saveUser()">Create Account</button>
    </div>

    <div id="main-app" class="hidden">
        <header>
            <p class="date-label" id="top-date"></p>
            <h1 style="font-size: 34px; margin: 5px 0;">Today</h1>
        </header>

        <div class="calendar-strip" id="cal-strip"></div>

        <div class="rings-box">
            <div style="line-height: 1.8;">
                <p style="color: var(--ios-red); margin: 0;">● MOVE</p>
                <p style="color: var(--ios-green); margin: 0;">● WATER</p>
                <p style="color: var(--ios-lightblue); margin: 0;">● STAND</p>
            </div>
            <svg class="ring-svg">
                <circle cx="70" cy="70" r="55" stroke="#300" stroke-width="12" fill="none"/>
                <circle id="r-move" cx="70" cy="70" r="55" class="ring-path" stroke="var(--ios-red)" stroke-dasharray="345" stroke-dashoffset="345"/>
                <circle cx="70" cy="70" r="40" stroke="#030" stroke-width="12" fill="none"/>
                <circle id="r-water" cx="70" cy="70" r="40" class="ring-path" stroke="var(--ios-green)" stroke-dasharray="251" stroke-dashoffset="251"/>
            </svg>
        </div>

        <div class="grid">
            <div class="card card-full">
                <div class="label" style="color: var(--ios-red);">Steps Tracking</div>
                <div class="val" id="disp-steps">0</div>
                <div class="unit">Goal: <span id="goal-steps">12,000</span></div>
                <button id="gps-btn" class="btn" onclick="toggleGPS()">Start GPS Tracking</button>
            </div>

            <div class="card">
                <div class="label" style="color: var(--ios-blue);">Hydration</div>
                <div class="val" id="disp-water">0<small class="unit">/ 12</small></div>
                <button class="btn" onclick="addWater()">+ 1 Glass</button>
            </div>

            <div class="card">
                <div class="label">Metrics</div>
                <div class="val" id="disp-bmi">--<small class="unit">BMI</small></div>
                <div style="font-size: 12px; margin-top: 5px;"><span id="disp-dist">0.0</span> km | <span id="disp-cal">0</span> Cal</div>
            </div>

            <div class="card card-full">
                <div class="label" style="color: var(--ios-lightblue);">Mindfulness</div>
                <div class="breath-circle"></div>
                <p style="text-align: center; font-size: 12px; opacity: 0.5;">2-minute breathing exercise</p>
            </div>
        </div>
    </div>

    <script>
        let user = JSON.parse(localStorage.getItem('hp_user'));
        let stats = JSON.parse(localStorage.getItem('hp_stats')) || { 
            steps: 0, water: 0, dist: 0, date: new Date().toDateString() 
        };
        let isTracking = false;
        let watchID = null;

        function saveUser() {
            const n = document.getElementById('in-name').value;
            const w = document.getElementById('in-weight').value;
            const h = document.getElementById('in-height').value;
            if(!n || !w || !h) return alert("Fill all fields");

            user = { name: n, weight: parseFloat(w), height: parseFloat(h) };
            localStorage.setItem('hp_user', JSON.stringify(user));
            initApp();
        }

        function initApp() {
            document.getElementById('onboarding').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('top-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            
            buildCalendar();
            calculateHealth();
            updateUI();
        }

        function buildCalendar() {
            const strip = document.getElementById('cal-strip');
            const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            for(let i = -2; i <= 2; i++) {
                let d = new Date(); d.setDate(d.getDate() + i);
                let box = document.createElement('div');
                box.className = `day-box ${i===0?'today':''}`;
                box.innerHTML = `<span class="day-name">${days[d.getDay()]}</span><span class="day-num">${d.getDate()}</span>`;
                strip.appendChild(box);
            }
        }

        function calculateHealth() {
            const bmi = (user.weight / ((user.height/100)**2)).toFixed(1);
            document.getElementById('disp-bmi').innerHTML = `${bmi}<small class="unit">BMI</small>`;
            // Task setting: If BMI is high, increase step goal
            const customGoal = bmi > 25 ? 15000 : 12000;
            document.getElementById('goal-steps').innerText = customGoal.toLocaleString();
        }

        function addWater() { 
            stats.water++; 
            updateUI(); 
            saveStats(); 
        }

        function toggleGPS() {
            const btn = document.getElementById('gps-btn');
            if(!isTracking) {
                if ("geolocation" in navigator) {
                    btn.innerText = "Stop Tracking";
                    btn.classList.add('btn-active');
                    isTracking = true;
                    let lastPos = null;

                    watchID = navigator.geolocation.watchPosition(pos => {
                        if(lastPos) {
                            let d = getDistance(lastPos.lat, lastPos.lng, pos.coords.latitude, pos.coords.longitude);
                            stats.dist += d;
                            stats.steps += Math.round(d * 1312); // Accurate avg steps per km
                            updateUI();
                            saveStats();
                        }
                        lastPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    }, null, { enableHighAccuracy: true });
                }
            } else {
                navigator.geolocation.clearWatch(watchID);
                btn.innerText = "Start GPS Tracking";
                btn.classList.remove('btn-active');
                isTracking = false;
            }
        }

        // Haversine Formula for Accuracy
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1) * Math.PI / 180;
            const dLon = (lon2-lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * R;
        }

        function updateUI() {
            document.getElementById('disp-steps').innerText = stats.steps.toLocaleString();
            document.getElementById('disp-water').innerHTML = `${stats.water}<small class="unit">/ 12</small>`;
            document.getElementById('disp-dist').innerText = stats.dist.toFixed(2);
            document.getElementById('disp-cal').innerText = Math.round(stats.dist * 60); // Approx cal per km

            // Rings
            document.getElementById('r-move').style.strokeDashoffset = 345 - (345 * Math.min(stats.steps/12000, 1));
            document.getElementById('r-water').style.strokeDashoffset = 251 - (251 * Math.min(stats.water/12, 1));
        }

        function saveStats() { localStorage.setItem('hp_stats', JSON.stringify(stats)); }

        window.onload = () => { if(user) initApp(); };
    </script>
</body>
</html>
