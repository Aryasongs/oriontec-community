<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HeartFit Pro</title>
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-red: #FF2D55;
            --apple-green: #34C759;
            --bg: #F2F2F7;
            --card-bg: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'SF Pro Display', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 0;
            color: #000;
            overflow-x: hidden;
        }

        /* PREMIUM GLASSMORPHISM */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* HEADER & CALENDAR */
        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        .header { margin: 20px 0; }
        .header h1 { font-size: 34px; font-weight: 800; margin: 5px 0; }
        .header p { color: #8E8E93; text-transform: uppercase; font-size: 13px; font-weight: 600; }

        .calendar-strip {
            display: flex; gap: 12px; overflow-x: auto;
            padding: 10px 0 25px 0; scrollbar-width: none;
        }
        .calendar-strip::-webkit-scrollbar { display: none; }

        .date-card {
            min-width: 60px; height: 85px; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            border-radius: 18px; background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: 0.3s;
        }
        .date-card.active { background: var(--apple-blue); color: white; transform: scale(1.1); }
        .date-card span:first-child { font-size: 12px; font-weight: 600; opacity: 0.7; }
        .date-card span:last-child { font-size: 20px; font-weight: 800; }

        /* DASHBOARD CARDS */
        .main-card { padding: 25px; margin-bottom: 20px; position: relative; overflow: hidden; }
        .ring-container { position: absolute; right: 20px; top: 20px; width: 80px; height: 80px; }

        .stat-label { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .stat-value { font-size: 42px; font-weight: 800; margin: 15px 0; }
        .stat-goal { font-size: 14px; color: #8E8E93; }

        .btn-action {
            background: var(--apple-blue); color: white; border: none;
            padding: 12px 24px; border-radius: 12px; font-weight: 600; width: 100%;
            margin-top: 15px; cursor: pointer;
        }

        /* ONBOARDING */
        #onboarding {
            position: fixed; inset: 0; background: white; z-index: 2000;
            display: flex; flex-direction: column; padding: 40px; justify-content: center;
        }
        input {
            background: #F2F2F7; border: none; padding: 18px; border-radius: 15px;
            margin: 10px 0; font-size: 16px; width: 100%;
        }

        .hidden { display: none !important; }

        /* ANIMATION */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body>

    <div id="onboarding">
        <h1 style="font-size: 40px; margin-bottom: 10px;">HeartFit <span style="color: var(--apple-red);">Pro</span></h1>
        <p style="color: #666; margin-bottom: 30px;">Enter your details to generate your custom heart health plan.</p>
        <input type="text" id="nameIn" placeholder="Full Name">
        <input type="number" id="weightIn" placeholder="Weight (kg)">
        <input type="number" id="heightIn" placeholder="Height (cm)">
        <button class="btn-action" onclick="setup()">Start Premium Tracking</button>
    </div>

    <div id="app" class="container hidden">
        <div class="header">
            <p id="top-date">TUESDAY, APRIL 7</p>
            <h1>Summary</h1>
        </div>

        <div class="calendar-strip" id="calendar"></div>

        <div class="grid">
            <div class="glass main-card fade">
                <div class="stat-label">🏃‍♂️ <span style="color: var(--apple-red)">Activity</span></div>
                <div class="stat-value" id="step-count">0</div>
                <div class="stat-goal">Goal: 10,000 steps</div>
            </div>

            <div class="glass main-card fade" style="animation-delay: 0.1s;">
                <div class="stat-label">💧 <span style="color: var(--apple-blue)">Hydration</span></div>
                <div class="stat-value"><span id="water-count">0</span><small style="font-size: 18px; color: #8E8E93;">/8 Glasses</small></div>
                <button class="btn-action" style="background: rgba(0,122,255,0.1); color: var(--apple-blue);" onclick="drink()">Drink Water</button>
            </div>

            <div class="glass main-card fade" style="animation-delay: 0.2s;">
                <div class="stat-label">❤️ <span style="color: var(--apple-green)">Heart Task</span></div>
                <p id="task-desc" style="font-size: 18px; font-weight: 600; margin: 15px 0;"></p>
                <div class="stat-goal" id="bmi-label"></div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('hf_pro_v1')) || {
            user: null,
            daily: { steps: 0, water: 0, date: new Date().toDateString() },
            history: {}
        };

        // SETUP & PERSONALIZATION
        function setup() {
            const n = document.getElementById('nameIn').value;
            const w = document.getElementById('weightIn').value;
            const h = document.getElementById('heightIn').value;
            if(!n || !w || !h) return alert("Please fill details");

            db.user = { name: n, weight: w, height: h };
            save();
            renderApp();
        }

        // ACCURATE CALENDAR SYSTEM
        function buildCalendar() {
            const cal = document.getElementById('calendar');
            cal.innerHTML = '';
            const today = new Date();
            
            for(let i = -3; i <= 3; i++) {
                const d = new Date();
                d.setDate(today.getDate() + i);
                const isToday = i === 0;
                
                const card = document.createElement('div');
                card.className = `date-card ${isToday ? 'active' : ''}`;
                card.innerHTML = `
                    <span>${d.toLocaleDateString('en', {weekday: 'short'})}</span>
                    <span>${d.getDate()}</span>
                `;
                cal.appendChild(card);
            }
        }

        // BACKGROUND STEP TRACKING LOGIC
        function initSensors() {
            if ('LinearAccelerationSensor' in window) {
                const sensor = new LinearAccelerationSensor({ frequency: 60 });
                let lastMag = 0;
                sensor.addEventListener('reading', () => {
                    let mag = Math.sqrt(sensor.x**2 + sensor.y**2 + sensor.z**2);
                    if (mag - lastMag > 10) {
                        db.daily.steps++;
                        updateUI();
                        save();
                    }
                    lastMag = mag;
                });
                sensor.start();
            }
        }

        function drink() {
            db.daily.water++;
            updateUI();
            save();
        }

        function updateUI() {
            document.getElementById('step-count').innerText = db.daily.steps.toLocaleString();
            document.getElementById('water-count').innerText = db.daily.water;
            
            // Heart Task Logic
            const bmi = (db.user.weight / ((db.user.height/100)**2)).toFixed(1);
            document.getElementById('bmi-label').innerText = `Your Health Score (BMI): ${bmi}`;
            document.getElementById('task-desc').innerText = bmi > 25 ? 
                "Focus on 45 min walk to lower heart strain." : 
                "Perfect! Keep heart active with 15 min jumping jacks.";
        }

        function save() { localStorage.setItem('hf_pro_v1', JSON.stringify(db)); }

        function renderApp() {
            document.getElementById('onboarding').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            buildCalendar();
            updateUI();
            initSensors();
        }

        // AUTO RESET AT MIDNIGHT
        function checkMidnight() {
            const today = new Date().toDateString();
            if(db.daily.date !== today) {
                db.history[db.daily.date] = { steps: db.daily.steps, water: db.daily.water };
                db.daily.steps = 0;
                db.daily.water = 0;
                db.daily.date = today;
                save();
                updateUI();
            }
        }

        window.onload = () => {
            if(db.user) { renderApp(); checkMidnight(); }
            document.getElementById('top-date').innerText = new Date().toLocaleDateString('en', {weekday:'long', month:'long', day:'numeric'});
        };

        // SERVICE WORKER REGISTRATION (For Background Work)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
