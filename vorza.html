<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIONTEC ELD - Database Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-line { stroke: #e2e8f0; stroke-width: 1; }
        .log-path { fill: none; stroke: #2563eb; stroke-width: 3; stroke-linecap: round; }
        .status-active { border-color: #2563eb; background: #eff6ff; transform: scale(0.98); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900">

    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col">
        
        <header class="bg-slate-900 text-white p-5 pt-8 rounded-b-3xl">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-2xl font-black italic">ORIONTEC <span class="text-blue-400">DB</span></h1>
                    <p id="date-display" class="text-xs opacity-50 font-mono uppercase"></p>
                </div>
                <div class="bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-[10px] font-bold border border-green-500/50">
                    DATABASE CONNECTED
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-6">
                <div class="bg-white/5 p-3 rounded-2xl backdrop-blur-sm border border-white/10">
                    <p class="text-[9px] uppercase font-bold opacity-60">Driving (11h)</p>
                    <p id="drive-clock" class="text-2xl font-mono font-bold text-blue-400">11:00:00</p>
                </div>
                <div class="bg-white/5 p-3 rounded-2xl backdrop-blur-sm border border-white/10">
                    <p class="text-[9px] uppercase font-bold opacity-60">Workday (14h)</p>
                    <p id="shift-clock" class="text-2xl font-mono font-bold text-orange-400">14:00:00</p>
                </div>
            </div>
        </header>

        <main class="flex-1 p-5 space-y-6">
            
            <div class="bg-slate-50 p-4 rounded-3xl border border-slate-200">
                <svg id="log-graph" viewBox="0 0 720 160" class="w-full">
                    <g class="grid">
                        <line x1="0" y1="20" x2="720" y2="20" class="grid-line" />
                        <line x1="0" y1="60" x2="720" y2="60" class="grid-line" />
                        <line x1="0" y1="100" x2="720" y2="100" class="grid-line" />
                        <line x1="0" y1="140" x2="720" y2="140" class="grid-line" />
                    </g>
                    <path id="path-line" d="" class="log-path" />
                </svg>
            </div>

            <div class="grid grid-cols-4 gap-2">
                <button onclick="changeStatus('OFF')" id="btn-OFF" class="flex flex-col items-center py-4 rounded-2xl border-2 border-slate-100 bg-white shadow-sm transition-all font-bold text-[10px]">
                    🏠<br>OFF
                </button>
                <button onclick="changeStatus('SB')" id="btn-SB" class="flex flex-col items-center py-4 rounded-2xl border-2 border-slate-100 bg-white shadow-sm transition-all font-bold text-[10px]">
                    🛌<br>SLEEPER
                </button>
                <button onclick="changeStatus('DR')" id="btn-DR" class="flex flex-col items-center py-4 rounded-2xl border-2 border-slate-100 bg-white shadow-sm transition-all font-bold text-[10px]">
                    🚛<br>DRIVE
                </button>
                <button onclick="changeStatus('ON')" id="btn-ON" class="flex flex-col items-center py-4 rounded-2xl border-2 border-slate-100 bg-white shadow-sm transition-all font-bold text-[10px]">
                    🔧<br>ON DUTY
                </button>
            </div>

            <div class="space-y-3">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">Database Records</h3>
                <div id="log-entries" class="space-y-2 max-h-48 overflow-y-auto pr-2">
                    </div>
            </div>
        </main>

        <footer class="p-5 bg-white border-t flex gap-2">
            <button onclick="exportData()" class="flex-1 bg-slate-100 text-slate-700 py-3 rounded-xl font-bold text-xs uppercase">Export JSON</button>
            <button onclick="nukeDatabase()" class="bg-red-50 text-red-500 px-4 py-3 rounded-xl font-bold text-xs uppercase">Reset</button>
        </footer>
    </div>

    <script>
        // --- INDEXED DB ENGINE ---
        let db;
        let currentStatus = 'OFF';
        let logs = [];
        const DB_NAME = "OriontecELD";
        const STORE_NAME = "DailyLogs";

        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            loadLogsFromDB();
        };

        // --- HOS CALCULATOR ---
        function getSecs() {
            const n = new Date();
            return (n.getHours() * 3600) + (n.getMinutes() * 60) + n.getSeconds();
        }

        async function changeStatus(status) {
            if (status === currentStatus) return;
            const entry = { 
                status: status, 
                time: getSecs(), 
                timestamp: new Date().toISOString() 
            };
            
            const tx = db.transaction(STORE_NAME, "readwrite");
            await tx.objectStore(STORE_NAME).add(entry);
            currentStatus = status;
            loadLogsFromDB();
        }

        function loadLogsFromDB() {
            const tx = db.transaction(STORE_NAME, "readonly");
            const store = tx.objectStore(STORE_NAME);
            const req = store.getAll();
            
            req.onsuccess = () => {
                logs = req.result;
                if (logs.length > 0) {
                    currentStatus = logs[logs.length - 1].status;
                }
                updateUI();
            };
        }

        function updateUI() {
            // Update Buttons
            document.querySelectorAll('button[id^="btn-"]').forEach(b => b.classList.remove('status-active'));
            document.getElementById(`btn-${currentStatus}`).classList.add('status-active');

            // Draw Graph
            const path = document.getElementById('path-line');
            const statusY = { 'OFF': 20, 'SB': 60, 'DR': 100, 'ON': 140 };
            let d = "";
            const now = getSecs();

            logs.forEach((log, i) => {
                const x = (log.time / 86400) * 720;
                const y = statusY[log.status];
                if (i === 0) d += `M ${x} ${y}`;
                else {
                    const prevX = (logs[i-1].time / 86400) * 720;
                    d += ` L ${x} ${statusY[logs[i-1].status]} L ${x} ${y}`;
                }
            });
            d += ` L ${(now/86400)*720} ${statusY[currentStatus]}`;
            path.setAttribute('d', d);

            // Update List
            const list = document.getElementById('log-entries');
            list.innerHTML = logs.map(l => `
                <div class="flex justify-between p-3 bg-slate-50 rounded-xl border border-slate-100 animate-in slide-in-from-bottom-2">
                    <span class="font-black text-[10px] text-blue-600">${l.status}</span>
                    <span class="font-mono text-[10px] text-slate-400">${l.timestamp.split('T')[1].split('.')[0]}</span>
                </div>
            `).reverse().join('');

            calculateClocks();
        }

        function calculateClocks() {
            let driveUsed = 0;
            const now = getSecs();
            logs.forEach((log, i) => {
                const end = logs[i+1] ? logs[i+1].time : now;
                if (log.status === 'DR') driveUsed += (end - log.time);
            });
            
            const driveLeft = (11 * 3600) - driveUsed;
            document.getElementById('drive-clock').innerText = formatHMS(driveLeft);
        }

        function formatHMS(s) {
            const h = Math.floor(Math.abs(s) / 3600);
            const m = Math.floor((Math.abs(s) % 3600) / 60);
            const sec = Math.abs(s) % 60;
            return `${s < 0 ? '-' : ''}${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        function nukeDatabase() {
            if(confirm("Wipe Database?")) {
                const tx = db.transaction(STORE_NAME, "readwrite");
                tx.objectStore(STORE_NAME).clear();
                logs = [];
                location.reload();
            }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(logs, null, 2)], {type : 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ELD_LOGS_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        setInterval(updateUI, 1000);
        document.getElementById('date-display').innerText = new Date().toDateString();
    </script>
</body>
</html>
